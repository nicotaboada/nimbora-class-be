  """Desasigna un fee de un estudiante cancelando sus cuotas pendientes"""
  unassignFeeFromStudent(input: UnassignFeeInput!): UnassignFeeOutput!
  updateAcademy(input: UpdateAcademyInput!): Academy!

  """Edita el nombre de un punto de venta AFIP"""
  updateAfipSalesPoint(
    """ID del punto de venta"""
    id: String!
    input: UpdateAfipSalesPointInput!
  ): AfipSalesPoint!

  """Actualiza el descuento de una línea"""
  updateInvoiceLine(input: UpdateInvoiceLineInput!): Invoice!
  updateMonthlyFee(input: UpdateMonthlyFeeInput!): Fee!
  updateOneOffFee(input: UpdateOneOffFeeInput!): Fee!
  updatePeriodicFee(input: UpdatePeriodicFeeInput!): Fee!
  updateStudent(updateStudentInput: UpdateStudentInput!): Student!
  updateTeacher(updateTeacherInput: UpdateTeacherInput!): Teacher!
  updateTeacherContactInfo(input: UpdateContactInfoInput!): Teacher!
  updateUser(input: UpdateUserInput!): User!

  """Crea o actualiza un perfil de facturación de un alumno"""
  upsertBillingProfile(input: UpsertBillingProfileInput!): BillingProfile!

  """
  Valida un punto de venta contra ARCA, lo activa y desactiva todos los demás puntos de venta
  """
  validateAfipSalesPoint(
    """ID del punto de venta a validar"""
    id: String!
  ): AfipSalesPoint!

  """
  Step 3: Verifica la delegación WSFE y avanza onboarding de DELEGATION_2 a COMPLETED
  """
  verifyAfipDelegation: AcademyAfipSettings!

  """Anula una factura (soft delete)"""
  voidInvoice(invoiceId: ID!): Invoice!

  """Anula un pago (soft delete)"""
  voidPayment(input: VoidPaymentInput!): Invoice!
}

